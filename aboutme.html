<!DOCTYPE html>
<html>
<head>
    <title>About Me</title>
    <link rel="stylesheet" href="style.css">
</head>
  <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

/* 🌈 Gradient Background */
body{
    min-height:100vh;
    padding:50px 20px;
    background: linear-gradient(135deg, #1e3c72, #2a5298, #6a11cb);
    background-size: 300% 300%;
    animation: gradientMove 8s ease infinite;
}

/* 🎬 Background Animation */
@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* 🏷 Title */
.page-title{
    color:white;
    text-align:center;
    font-size:50px;
    margin-bottom:50px;
    letter-spacing:2px;
}

/* 🧊 Glass Card */
.card{
    max-width:900px;
    margin:0 auto 60px;
    padding:40px;
    border-radius:20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    color:white;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.4s;
}

.card:hover{
    transform: scale(1.02);
}

.card h2{
    text-align:center;
    margin-bottom:25px;
}

.card h3{
    margin-top:20px;
    color:#ffd700;
}

.card p{
    line-height:1.8;
    color:#f1f1f1;
}

/* 💻 Skills Section */
.skills-card{
    max-width:700px;
    margin:auto;
    padding:30px;
    border-radius:20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.skills-card h2{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

/* 🧱 Skill Boxes */
.skill-box{
    background: rgba(255,255,255,0.2);
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    transition:0.4s;
    color:white;
}

.skill-box:hover{
    transform:translateY(-8px) scale(1.02);
    background: rgba(255,255,255,0.3);
}

.skill-box h3{
    margin-bottom:10px;
    color:#ffd700;
}

.skill-box p{
    color:#f1f1f1;
}
  </style>
<body>

<section class="about-section">

    <h1 class="page-title">About Me</h1>

    <div class="card">
        <h2>👤 About Me</h2>

        <h3>Academic Background</h3>
        <p>4th Year Computer Science Student.</p>

        <h3>Passion & Interests</h3>
        <p>Interested in Web Development and Software Engineering.</p>
    </div>

    <div class="skills-card">
        <h2>💻 Skills Overview</h2>

        <div class="skill-box">
            <h3>Frontend</h3>
            <p>HTML, CSS, JavaScript, React</p>
        </div>

        <div class="skill-box">
            <h3>Backend</h3>
            <p>Node.js, Express.js</p>
        </div>

        <div class="skill-box">
            <h3>Database</h3>
            <p>MongoDB, MySQL</p>
        </div>

    </div>

</section>

</body>
</html>
